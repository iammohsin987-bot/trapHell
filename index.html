<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TRAP HELL: BALANCED RETRO</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#050505;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;min-height:100vh;font-family:'Press Start 2P',monospace;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;}
#wrap{position:relative;width:400px;max-width:100vw;box-shadow:0 0 30px rgba(255,34,0,0.2);}
#hud{width:100%;display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#0d0d11;border:3px solid #333344;border-bottom:none;color:#ff2200;font-size:8px;}
.canvas-container{position:relative;width:400px;max-width:100vw;}
canvas{display:block;width:400px;max-width:100vw;image-rendering:pixelated;border:3px solid #333344;}
.canvas-container::after{content:"";position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(rgba(18,16,16,0) 50%,rgba(0,0,0,0.2) 50%);background-size:100% 4px;pointer-events:none;z-index:10;}
#ctrl{width:100%;display:flex;justify-content:space-between;align-items:center;padding:15px 10px;background:#0d0d11;border:3px solid #333344;border-top:none;}
.dp{display:grid;grid-template-columns:50px 50px 50px;grid-template-rows:50px 50px;gap:6px;}
.gb{background:#171722;border:2px solid #444455;color:#8888aa;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:6px;-webkit-tap-highlight-color:transparent;touch-action:none;box-shadow:inset 0 -4px 0 #222233;}
.gb:active,.gb.on{background:#ff2200;color:#000;border-color:#ff6644;box-shadow:none;transform:translateY(4px);}
.gl{grid-column:1;grid-row:2;}.gr{grid-column:3;grid-row:2;}
.jb{width:86px;height:86px;border-radius:50%;font-size:11px;background:#221111;border:3px solid #ff2200;color:#ff2200;font-family:'Press Start 2P',monospace;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;touch-action:none;box-shadow:0 5px 0 #990000, inset 0 -2px 0 #550000;}
.jb:active,.jb.on{background:#ff2200;color:#000;box-shadow:none;transform:translateY(5px);}
#ov{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(5,5,10,0.96);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;}
#ov h1{font-size:24px;color:#ff2200;text-shadow:0 0 15px #ff2200;margin-bottom:12px;text-align:center;}
#ov p{font-size:7px;color:#888;margin-bottom:6px;}
#ov .sb{margin-top:20px;padding:12px 24px;background:#ff2200;border:none;color:#000;font-family:'Press Start 2P',monospace;font-size:11px;cursor:pointer;}
#flash{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:0;z-index:15;background:#ff3300;}
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <span style="color:#ff4444">❤️ MOTO</span>
    <span style="color:#ffcc00">STAGE <span id="lv">1</span></span>
    <span style="color:#ff2200">☠️ <span id="dd">0</span></span>
  </div>
  <div class="canvas-container">
    <canvas id="c" width="400" height="440"></canvas>
    <div id="flash"></div>
    <div id="ov">
      <h1>TRAP<br>ADVENTURE</h1>
      <p>◄ ► MOVE &nbsp; ▲ JUMP</p>
      <p>SPEED REDUCED & TRAPS BALANCED</p>
      <button class="sb" id="sb">START</button>
    </div>
  </div>
  <div id="ctrl">
    <div class="dp">
      <div class="gb gl" id="bl">◄</div>
      <div class="gb gr" id="br">►</div>
    </div>
    <div class="jb" id="bj">JUMP</div>
  </div>
</div>

<script>
const CV = document.getElementById('c');
const cx = CV.getContext('2d');
cx.imageRendering = 'pixelated';
const W = 400, H = 440, T = 32;

// Tightly calibrated responsive physics metrics
const GRAV = 0.65;     
const JUMP = -11.2;    
const MAXFALL = 11;
const SPEED = 2.8;     // Reduced speed for precise navigation controls

const K = {l:0,r:0,j:0};
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='a')K.l=1;
  if(e.key==='ArrowRight'||e.key==='d')K.r=1;
  if(['ArrowUp',' ','z','w'].includes(e.key))K.j=1;
});
document.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft'||e.key==='a')K.l=0;
  if(e.key==='ArrowRight'||e.key==='d')K.r=0;
  if(['ArrowUp',' ','z','w'].includes(e.key))K.j=0;
});

function mb(id,k){
  const b=document.getElementById(id);
  b.addEventListener('touchstart',e=>{K[k]=1;b.classList.add('on');e.preventDefault();},{passive:false});
  b.addEventListener('touchend',e=>{K[k]=0;b.classList.remove('on');e.preventDefault();},{passive:false});
}
mb('bl','l');mb('br','r');mb('bj','j');

const PW = 16, PH = 24;
let P = {x:0,y:0,vx:0,vy:0,onGround:false,jHeld:false,dead:false,face:1,animTick:0};

let CAM = {y:0};
let shk = 0;
let GS = {lvl:1,deaths:0,playing:false};
let LD = null, LO = [];

function mkRng(seed) {
  let s = seed;
  return () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0xffffffff; };
}

function buildLevel(n) {
  const rng = mkRng(n * 57 + 13);
  const vTiles = 26; 
  const worldH = vTiles * T;
  const objs = [];

  objs.push({type:'solid', x:0, y:worldH-T, w:W, h:T});
  objs.push({type:'solid', x:-T, y:0, w:T, h:worldH});
  objs.push({type:'solid', x:W, y:0, w:T, h:worldH});

  let curX = 32;
  let curY = worldH - T * 3;
  const path = [{x: curX, y: curY, w: 96}];

  objs.push({type:'solid', x: curX, y: curY, w: 96, h: T});

  while(curY > T * 3) {
    let jumpUpCells = 2; 
    let jumpAcrossCells = 2 + Math.floor(rng() * 2); 
    
    let direction = (curX > W - 160) ? -1 : (curX < 64) ? 1 : (rng() < 0.5 ? -1 : 1);
    
    curY -= (jumpUpCells * T);
    curX += direction * (jumpAcrossCells * T);

    if(curX < 32) curX = 32;
    if(curX > W - 128) curX = W - 128;

    let pWidth = 96; // Generous platform sizing
    path.push({x: curX, y: curY, w: pWidth});
    objs.push({type:'solid', x: curX, y: curY, w: pWidth, h: T});
    
    if(path.length > 1) {
      let trapRoll = rng();
      if(trapRoll < 0.3) {
        // Shifting platform trap
        objs.push({
          type: 'deceptive_platform',
          x: curX, y: curY, w: pWidth, h: T,
          targetX: curX + (direction * 32), // Slower, shorter shifting offset distance
          triggered: false
        });
        objs.pop(); 
      } else if(trapRoll < 0.55) {
        // Balanced Ceiling Spikes (Narrower spike bounding area, easier to bait or escape)
        objs.push({
          type: 'ceiling_spike',
          x: curX + 36,
          y: curY - 84,
          w: 24, h: 16,
          triggered: false
        });
      }
    }
  }

  let midPlatform = path[Math.floor(path.length / 2)];
  objs.push({
    type: 'fake_checkpoint',
    x: midPlatform.x + 42,
    y: midPlatform.y - 24,
    w: 12, h: 24,
    triggered: false
  });

  const startNode = path[0];
  const endNode = path[path.length - 1];

  return {
    worldH: worldH,
    spawn: { x: startNode.x + 16, y: startNode.y - PH - 4 },
    exit: { x: endNode.x + 32, y: endNode.y - 32 },
    objects: objs
  };
}

function loadLevel(n, fromCp=false){
  LD = buildLevel(n);
  LO = LD.objects.map(o=>({...o}));
  resetP(LD.spawn.x, LD.spawn.y);
  CAM.y = Math.max(0, Math.min(LD.worldH - H, P.y - H / 2));
  document.getElementById('lv').innerText = GS.lvl;
  document.getElementById('dd').innerText = GS.deaths;
}

function resetP(x,y){
  P.x=x; P.y=y; P.vx=0; P.vy=0;
  P.onGround=false; P.dead=false; P.jHeld=false; P.face=1;
}

function hits(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}

function updateP(){
  if(P.dead) return;

  if(K.l){ P.vx = -SPEED; P.face = -1; P.animTick++; }
  else if(K.r){ P.vx = SPEED; P.face = 1; P.animTick++; }
  else { P.vx = 0; P.animTick = 0; }

  if(!P.onGround) P.vy += GRAV;
  if(P.vy > MAXFALL) P.vy = MAXFALL;

  if(K.j && P.onGround && !P.jHeld){
    P.vy = JUMP;
    P.onGround = false;
    P.jHeld = true;
  }
  if(!K.j) P.jHeld = false;

  P.x += P.vx;
  if(P.x < 0) P.x = 0; if(P.x + PW > W) P.x = W - PW;

  for(let o of LO){
    if(o.type === 'solid' || o.type === 'deceptive_platform'){
      if(hits(P.x, P.y, PW, PH, o.x, o.y, o.w, o.h)){
        const ox = Math.min(P.x+PW, o.x+o.w) - Math.max(P.x, o.x);
        const oy = Math.min(P.y+PH, o.y+o.h) - Math.max(P.y, o.y);
        if(ox < oy){
          if(P.x + PW/2 < o.x + o.w/2) P.x -= ox; else P.x += ox;
          P.vx = 0;
        }
      }
    }
  }

  P.y += P.vy;
  P.onGround = false;

  for(let o of LO){
    if(o.type === 'solid' || o.type === 'deceptive_platform'){
      if(hits(P.x, P.y, PW, PH, o.x, o.y, o.w, o.h)){
        const ox = Math.min(P.x+PW, o.x+o.w) - Math.max(P.x, o.x);
        const oy = Math.min(P.y+PH, o.y+o.h) - Math.max(P.y, o.y);
        if(oy <= ox){
          if(P.y + PH/2 < o.y + o.h/2){
            P.y -= oy; P.vy = 0; P.onGround = true;
          } else {
            P.y += oy; P.vy = 0;
          }
        }
      }
    }
  }

  if(P.y > LD.worldH + 40) die();
}

function updateTraps(){
  for(let o of LO){
    if(o.type === 'deceptive_platform'){
      if(!o.triggered && Math.abs(P.y - o.y) < 64 && Math.abs(P.x - o.x) < 48 && !P.onGround){
        o.triggered = true;
      }
      if(o.triggered) {
        o.x += (o.targetX - o.x) * 0.1; // Smooth, manageable platform movement speed
      }
    }
    if(o.type === 'ceiling_spike'){
      // Smaller precise horizontal window to drop, gives you room to jump past it safely
      if(!o.triggered && Math.abs(P.x - o.x) < 20 && P.y > o.y && P.y < o.y + 100){
        o.triggered = true;
      }
      if(o.triggered){
        o.y += 3.5; // Significantly cut dropping velocity down for reactiveness
      }
    }
    if(o.type === 'fake_checkpoint'){
      if(!o.triggered && hits(P.x, P.y, PW, PH, o.x - 2, o.y, o.w + 4, o.h)){
        o.triggered = true;
        o.type = 'spike_up';
        o.y -= 4; o.h += 8;
        die();
      }
    }
  }
}

function checkHazards(){
  if(P.dead) return;
  for(let o of LO){
    if(o.type === 'ceiling_spike' || o.type === 'spike_up'){
      if(hits(P.x, P.y, PW, PH, o.x, o.y, o.w, o.h)){
        die(); return;
      }
    }
  }
}

function checkGoals(){
  if(P.dead) return;
  let ex = LD.exit;
  if(hits(P.x, P.y, PW, PH, ex.x, ex.y, 24, 24)){
    GS.lvl++;
    loadLevel(GS.lvl);
  }
}

function die(){
  if(P.dead) return;
  P.dead = true;
  GS.deaths++;
  shk = 10;
  document.getElementById('flash').style.opacity = 0.7;
  setTimeout(() => document.getElementById('flash').style.opacity = 0, 60);
  setTimeout(() => { loadLevel(GS.lvl, false); }, 400);
}

function updateCamera(){
  let targetY = P.y - H * 0.55;
  CAM.y += (targetY - CAM.y) * 0.15;
  CAM.y = Math.max(0, Math.min(LD.worldH - H, CAM.y));
}

function drawPlayer(rx, ry) {
  cx.fillStyle = "#ffffff"; 
  cx.fillRect(rx + 2, ry, 12, 8); 
  cx.fillStyle = "#000";
  cx.fillRect(P.face === 1 ? rx + 10 : rx + 4, ry + 2, 2, 2); 
  
  cx.fillStyle = "#ff2200"; 
  cx.fillRect(rx, ry + 8, 16, 10); 
  
  cx.fillStyle = "#ffffff"; 
  let legF = Math.floor(P.animTick / 5) % 2;
  if(!P.onGround) {
    cx.fillRect(rx + 1, ry + 18, 4, 4); cx.fillRect(rx + 11, ry + 18, 4, 6);
  } else if(P.vx !== 0) {
    if(legF === 0) {
      cx.fillRect(rx + 1, ry + 18, 4, 6); cx.fillRect(rx + 11, ry + 18, 4, 4);
    } else {
      cx.fillRect(rx + 1, ry + 18, 4, 4); cx.fillRect(rx + 11, ry + 18, 4, 6);
    }
  } else {
    cx.fillRect(rx + 2, ry + 18, 4, 6); cx.fillRect(rx + 10, ry + 18, 4, 6);
  }
}

function draw(){
  cx.clearRect(0,0,W,H);
  cx.save();
  if(shk > 0){ shk--; cx.translate((Math.random()-0.5)*4, (Math.random()-0.5)*4); }

  cx.fillStyle = "#09090e";
  cx.fillRect(0, 0, W, H);

  for(let o of LO){
    let rx = o.x;
    let ry = o.y - CAM.y;
    
    if(o.type === 'solid' || o.type === 'deceptive_platform'){
      cx.fillStyle = '#1c1c28'; cx.fillRect(rx, ry, o.w, o.h);
      cx.strokeStyle = '#3a3a4c'; cx.lineWidth = 2; cx.strokeRect(rx, ry, o.w, o.h);
    } 
    else if(o.type === 'ceiling_spike' || o.type === 'spike_up'){
      cx.fillStyle = '#ff3300';
      cx.beginPath();
      if(o.type === 'ceiling_spike') {
        cx.moveTo(rx, ry); cx.lineTo(rx + o.w/2, ry + o.h); cx.lineTo(rx + o.w, ry);
      } else {
        cx.moveTo(rx, ry + o.h); cx.lineTo(rx + o.w/2, ry); cx.lineTo(rx + o.w, ry + o.h);
      }
      cx.fill();
    }
    else if(o.type === 'fake_checkpoint') {
      cx.fillStyle = '#00ff66'; cx.fillRect(rx, ry, o.w, o.h);
    }
  }

  let exrx = LD.exit.x; let exry = LD.exit.y - CAM.y;
  cx.fillStyle = '#ffcc00'; cx.fillRect(exrx, exry, 24, 24);

  if(!P.dead) drawPlayer(P.x, P.y - CAM.y);

  cx.restore();
}

function restart(){
  document.getElementById('ov').style.display='none';
  GS.lvl = 1; GS.deaths = 0; GS.playing = true;
  loadLevel(1);
}
document.getElementById('sb').addEventListener('click', restart);

let frame = () => {
  if(GS.playing){
    updateP();
    updateTraps();
    checkHazards();
    checkGoals();
    updateCamera();
    draw();
  }
  requestAnimationFrame(frame);
};
loadLevel(1);
draw();
frame();
</script>
</body>
</html>
