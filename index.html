<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TRAP HELL</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;min-height:100vh;font-family:'Press Start 2P',monospace;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;}
#wrap{position:relative;width:400px;max-width:100vw;}
#hud{width:100%;display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:#0a0a0a;border:2px solid #ff2200;border-bottom:none;color:#ff2200;font-size:7px;}
canvas{display:block;width:400px;max-width:100vw;image-rendering:pixelated;border-left:2px solid #ff2200;border-right:2px solid #ff2200;}
#ctrl{width:100%;display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:#0a0a0a;border:2px solid #ff2200;border-top:none;}
.dp{display:grid;grid-template-columns:44px 44px 44px;grid-template-rows:44px 44px;gap:3px;}
.gb{background:#1a0000;border:2px solid #ff2200;color:#ff2200;font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:3px;-webkit-tap-highlight-color:transparent;touch-action:none;}
.gb:active,.gb.on{background:#ff2200;color:#000;}
.gl{grid-column:1;grid-row:2;}.gr{grid-column:3;grid-row:2;}.gu{grid-column:2;grid-row:1;}.gd{grid-column:2;grid-row:2;}
.jb{width:76px;height:76px;border-radius:50%;font-size:8px;background:#1a0000;border:3px solid #ff2200;color:#ff2200;font-family:'Press Start 2P',monospace;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;touch-action:none;}
.jb:active,.jb.on{background:#ff2200;color:#000;}
#adbar{width:100%;height:52px;background:#0a0a0a;border:2px solid #222;border-top:none;display:flex;align-items:center;justify-content:center;color:#333;font-size:6px;letter-spacing:1px;}
#ov{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.94);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;}
#ov h1{font-size:20px;color:#ff2200;text-shadow:0 0 30px #ff2200;margin-bottom:10px;text-align:center;line-height:1.6;}
#ov h2{font-size:9px;color:#ffcc00;margin-bottom:14px;text-align:center;line-height:2.2;}
#ov p{font-size:6px;color:#666;margin-bottom:5px;text-align:center;line-height:2;}
#ov .sb{margin-top:16px;padding:14px 28px;background:#ff2200;border:none;color:#000;font-family:'Press Start 2P',monospace;font-size:10px;cursor:pointer;letter-spacing:1px;animation:pu 0.9s infinite;}
@keyframes pu{0%,100%{transform:scale(1);box-shadow:0 0 12px #ff2200;}50%{transform:scale(1.07);box-shadow:0 0 28px #ff2200;}}
#flash{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:0;z-index:15;}
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <span style="color:#ff6666">❤️<span id="ld">3</span></span>
    <span style="color:#ffcc00">LVL <span id="lv">1</span>/50</span>
    <span style="color:#00ff88">⛳<span id="cpd">-</span></span>
    <span style="color:#ff4400">💀<span id="dd">0</span></span>
  </div>
  <div style="position:relative">
    <canvas id="c" width="400" height="500"></canvas>
    <div id="flash"></div>
    <div id="ov">
      <h1>TRAP<br>HELL</h1>
      <h2>50 LEVELS · PURE SUFFERING</h2>
      <p>◄ ► MOVE &nbsp; ▲ JUMP</p>
      <p>⛳ TOUCH CHECKPOINTS TO SAVE</p>
      <p>NOTHING IS SAFE. TRUST NOTHING.</p>
      <button class="sb" id="sb">► START SUFFERING</button>
    </div>
  </div>
  <div id="ctrl">
    <div class="dp">
      <div class="gb gu" id="bu">▲</div>
      <div class="gb gl" id="bl">◄</div>
      <div class="gb gd" id="bd"> </div>
      <div class="gb gr" id="br">►</div>
    </div>
    <div style="font-size:6px;color:#ff2200;text-align:center;line-height:2.2;font-family:'Press Start 2P',monospace;">TRUST<br>NOTHING<br>☠</div>
    <div class="jb" id="bj">JUMP</div>
  </div>
  <div id="adbar">[ ADMOB BANNER AD 320×50 — PLACE YOUR AD UNIT HERE ]</div>
</div>

<script>
const CV = document.getElementById('c');
const cx = CV.getContext('2d');
const W = 400, H = 500, T = 32;

const GRAV = 0.6;
const JUMP = -11.0;
const MAXFALL = 12;
const SPEED = 4.0;

const K = {l:0,r:0,j:0};
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='a')K.l=1;
  if(e.key==='ArrowRight'||e.key==='d')K.r=1;
  if(['ArrowUp',' ','z','w'].includes(e.key))K.j=1;
});
document.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft'||e.key==='a')K.l=0;
  if(e.key==='ArrowRight'||e.key==='d')K.r=0;
  if(['ArrowUp',' ','z','w'].includes(e.key))K.j=0;
});

function mb(id,k){
  const b=document.getElementById(id);
  b.addEventListener('touchstart',e=>{K[k]=1;b.classList.add('on');e.preventDefault();},{passive:false});
  b.addEventListener('touchend',e=>{K[k]=0;b.classList.remove('on');e.preventDefault();},{passive:false});
}
mb('bl','l');mb('br','r');mb('bu','j');mb('bj','j');

const PW=20, PH=28;
let P={x:0,y:0,vx:0,vy:0,onGround:false,jHeld:false,dead:false,inv:0,face:1,animF:0,animT:0,run:false};

let CAM={x:0,y:0};
let PARTS=[];
let shk=0,shkAmt=0;
function doShake(a,t){shkAmt=a;shk=t;}
function spawnP(x,y,col,n=8){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,sp=1+Math.random()*3;
    PARTS.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,life:20+Math.random()*10,col});
  }
}

let GS={lvl:1,lives:3,deaths:0,playing:false};
let LD=null, LO=[], cpActive=false, cpPos={x:0,y:0}, sawAngle=0;

function mkRng(seed) {
  let s = seed;
  return () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0xffffffff; };
}

function buildLevel(n) {
  const rng = mkRng(n * 31 + 17);
  const diff = (n - 1) / 49;
  
  const vTiles = 25 + Math.floor(diff * 15); 
  const worldH = vTiles * T;
  const objs = [];

  objs.push({type:'solid', x:0, y:worldH-T, w:W, h:T});
  objs.push({type:'solid', x:-T, y:0, w:T, h:worldH});
  objs.push({type:'solid', x:W, y:0, w:T, h:worldH});

  let currentGridX = 2; 
  let currentGridY = vTiles - 2; 
  
  const pathSteps = [];
  pathSteps.push({x: currentGridX, y: currentGridY});

  while (currentGridY > 3) {
    let nextStepY = currentGridY - (2 + Math.floor(rng() * 2));
    let nextStepX = currentGridX + (rng() < 0.5 ? -1 : 1) * (2 + Math.floor(rng() * 3));
    
    if (nextStepX < 1) nextStepX = 2;
    if (nextStepX > 10) nextStepX = 9;
    
    currentGridX = nextStepX;
    currentGridY = nextStepY;
    pathSteps.push({x: currentGridX, y: currentGridY});
  }

  pathSteps.forEach((step, idx) => {
    let pWidth = (idx === 0) ? T * 3 : T * (2 + Math.floor(rng() * 2));
    objs.push({
      type: 'solid',
      x: step.x * T,
      y: step.y * T,
      w: pWidth,
      h: T,
      isSpine: true
    });

    if (idx > 0 && rng() < 0.25 + (diff * 0.35)) {
      let tRoll = rng();
      if (tRoll < 0.4) {
        objs.push({type: 'drop_trap', x: (step.x * T) + 4, y: (step.y * T) - 8, w: 24, h: 8, triggered: false});
      } else if (tRoll < 0.7 && n > 5) {
        objs.push({type: 'fake', x: (step.x * T) + (T * 2), y: (step.y * T) - (T * 2), w: T, h: T});
      }
    }
  });

  if (n > 2) {
    pathSteps.forEach((step, idx) => {
      if(idx > 1 && idx < pathSteps.length - 1 && rng() < 0.3) {
        objs.push({type: 'spike_u', x: (step.x * T) + 6, y: (step.y * T) - 12, w: 20, h: 12});
      }
    });
  }

  if (n > 8) {
    let midIdx = Math.floor(pathSteps.length / 2);
    objs.push({
      type: 'saw',
      x: pathSteps[midIdx].x * T,
      y: (pathSteps[midIdx].y - 2) * T,
      r: 14,
      startX: 32,
      endX: W - 64,
      speed: 1.5 + (diff * 2),
      dir: 1
    });
  }

  const spawnNode = pathSteps[0];
  const exitNode = pathSteps[pathSteps.length - 1];
  const cpNode = pathSteps[Math.floor(pathSteps.length / 2)];

  return {
    worldH: worldH,
    spawn: { x: (spawnNode.x * T) + 8, y: (spawnNode.y * T) - PH - 4 },
    checkpoint: { x: (cpNode.x * T) + 12, y: (cpNode.y * T) - 32 },
    exit: { x: (exitNode.x * T) + 8, y: (exitNode.y * T) - 40 },
    bgCol: `hsl(${240 - (n*3)}, 25%, 8%)`,
    objects: objs
  };
}

function loadLevel(n, fromCp=false){
  LD = buildLevel(n);
  LO = LD.objects.map(o=>({...o}));
  if(fromCp && cpActive){
    resetP(cpPos.x, cpPos.y);
  } else {
    cpActive = false;
    resetP(LD.spawn.x, LD.spawn.y);
  }
  CAM.x = 0;
  CAM.y = Math.max(0, Math.min(LD.worldH - H, P.y - H / 2));
  updateHUD();
}

function resetP(x,y){
  P.x=x; P.y=y; P.vx=0; P.vy=0;
  P.onGround=false; P.dead=false; P.inv=40; P.jHeld=false;
}

function updateHUD(){
  document.getElementById('lv').innerText=GS.lvl;
  document.getElementById('ld').innerText=GS.lives;
  document.getElementById('dd').innerText=GS.deaths;
  document.getElementById('cpd').innerText=cpActive?'✓':'-';
}

function hits(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}

function updateP(){
  if(P.dead) return;
  if(P.inv > 0) P.inv--;

  if(K.l){ P.vx = -SPEED; P.face = -1; P.run = true; }
  else if(K.r){ P.vx = SPEED; P.face = 1; P.run = true; }
  else { P.vx *= 0.7; P.run = Math.abs(P.vx) > 0.5; }

  if(!P.onGround) P.vy += GRAV;
  if(P.vy > MAXFALL) P.vy = MAXFALL;

  if(K.j && P.onGround && !P.jHeld){
    P.vy = JUMP;
    P.onGround = false;
    P.jHeld = true;
    spawnP(P.x + PW/2, P.y + PH, '#ffffff', 4);
  }
  if(!K.j) P.jHeld = false;

  P.x += P.vx;
  if(P.x < 0) P.x = 0;
  if(P.x + PW > W) P.x = W - PW;

  for(let o of LO){
    if(o.type === 'solid'){
      if(hits(P.x, P.y, PW, PH, o.x, o.y, o.w, o.h)){
        const ox = Math.min(P.x+PW, o.x+o.w) - Math.max(P.x, o.x);
        const oy = Math.min(P.y+PH, o.y+o.h) - Math.max(P.y, o.y);
        if(ox < oy){
          if(P.x + PW/2 < o.x + o.w/2) P.x -= ox; else P.x += ox;
          P.vx = 0;
        }
      }
    }
  }

  P.y += P.vy;
  P.onGround = false;

  for(let o of LO){
    if(o.type === 'solid'){
      if(hits(P.x, P.y, PW, PH, o.x, o.y, o.w, o.h)){
        const ox = Math.min(P.x+PW, o.x+o.w) - Math.max(P.x, o.x);
        const oy = Math.min(P.y+PH, o.y+o.h) - Math.max(P.y, o.y);
        if(oy <= ox){
          if(P.y + PH/2 < o.y + o.h/2){
            P.y -= oy; P.vy = 0; P.onGround = true;
          } else {
            P.y += oy; P.vy = 0;
          }
        }
      }
    }
  }

  if(P.y > LD.worldH + 60) die();
}

function updateLO(){
  sawAngle += 0.06;
  for(let o of LO){
    if(o.type === 'saw'){
      o.x += o.speed * o.dir;
      if(o.x > o.endX || o.x < o.startX) o.dir *= -1;
    }
    if(o.type === 'drop_trap'){
      let dist = Math.hypot((P.x + PW/2) - (o.x + o.w/2), (P.y + PH/2) - (o.y + o.h/2));
      if(dist < 45) o.triggered = true;
      if(o.triggered) o.y += 5;
    }
  }
}

function checkHazards(){
  if(P.dead || P.inv > 0) return;
  for(let o of LO){
    if(o.type === 'spike_u' || o.type === 'drop_trap'){
      if(hits(P.x, P.y, PW, PH, o.x, o.y, o.w, o.h)){ die(); return; }
    }
    if(o.type === 'saw'){
      let cx2 = o.x; let cy2 = o.y;
      let pd = Math.hypot((P.x + PW/2) - cx2, (P.y + PH/2) - cy2);
      if(pd < o.r + 6){ die(); return; }
    }
  }
}

function checkGoals(){
  if(P.dead) return;
  let cp = LD.checkpoint;
  if(!cpActive && Math.hypot((P.x+PW/2)-cp.x, (P.y+PH/2)-cp.y) < 24){
    cpActive = true;
    cpPos = {x: cp.x - PW/2, y: cp.y - PH};
    spawnP(cp.x, cp.y, '#00ff88', 12);
    updateHUD();
  }
  let ex = LD.exit;
  if(Math.hypot((P.x+PW/2)-(ex.x+12), (P.y+PH/2)-(ex.y+16)) < 24){
    if(GS.lvl >= 50){
      GS.playing = false;
      showOv('win');
    } else {
      GS.lvl++;
      cpActive = false;
      loadLevel(GS.lvl);
    }
  }
}

function die(){
  if(P.dead) return;
  P.dead = true;
  GS.deaths++;
  spawnP(P.x+PW/2, P.y+PH/2, '#ff3300', 15);
  doShake(6, 10);
  document.getElementById('flash').style.opacity = 0.6;
  setTimeout(() => document.getElementById('flash').style.opacity = 0, 100);
  updateHUD();
  setTimeout(() => { loadLevel(GS.lvl, true); }, 600);
}

function updateCamera(){
  let targetY = P.y - H * 0.55;
  CAM.y += (targetY - CAM.y) * 0.1;
  CAM.y = Math.max(0, Math.min(LD.worldH - H, CAM.y));
}

function draw(){
  cx.clearRect(0,0,W,H);
  cx.save();
  if(shk > 0){
    shk--;
    cx.translate((Math.random()-0.5)*shkAmt, (Math.random()-0.5)*shkAmt);
  }

  cx.fillStyle = LD.bgCol;
  cx.fillRect(0, 0, W, H);

  for(let o of LO){
    let rx = o.x - CAM.x;
    let ry = o.y - CAM.y;
    if(o.type === 'solid'){
      cx.fillStyle = '#222233'; cx.fillRect(rx, ry, o.w, o.h);
      cx.strokeStyle = '#444466'; cx.strokeRect(rx, ry, o.w, o.h);
    } else if(o.type === 'fake') {
      cx.fillStyle = '#222233'; cx.fillRect(rx, ry, o.w, o.h);
    } else if(o.type === 'spike_u' || o.type === 'drop_trap'){
      cx.fillStyle = '#ff2200';
      cx.beginPath();
      cx.moveTo(rx, ry + o.h); cx.lineTo(rx + o.w/2, ry); cx.lineTo(rx + o.w, ry + o.h);
      cx.fill();
    } else if(o.type === 'saw'){
      cx.save(); cx.translate(rx, ry); cx.rotate(sawAngle);
      cx.fillStyle = '#777788'; cx.beginPath(); cx.arc(0,0,o.r,0,Math.PI*2); cx.fill();
      cx.strokeStyle = '#ff5500'; cx.lineWidth = 2; cx.stroke();
      cx.restore();
    }
  }

  let cprx = LD.checkpoint.x - CAM.x; let cpry = LD.checkpoint.y - CAM.y;
  cx.fillStyle = cpActive ? '#00ff88' : '#555555';
  cx.fillRect(cprx - 4, cpry, 8, 32);

  let exrx = LD.exit.x - CAM.x; let exry = LD.exit.y - CAM.y;
  cx.fillStyle = '#ffcc00'; cx.fillRect(exrx, exry, 24, 32);

  PARTS.forEach((p, index) => {
    p.x += p.vx; p.y += p.vy; p.life--;
    cx.fillStyle = p.col;
    cx.fillRect(p.x - CAM.x, p.y - CAM.y, 3, 3);
  });
  PARTS = PARTS.filter(p => p.life > 0);

  if(!P.dead){
    if(P.inv > 0 && Math.floor(P.inv/3)%2===0) cx.globalAlpha = 0.2;
    cx.fillStyle = '#ff3333';
    cx.fillRect(P.x - CAM.x, P.y - CAM.y, PW, PH);
    cx.globalAlpha = 1.0;
  }

  cx.restore();
}

function showOv(type){
  const ov=document.getElementById('ov');
  ov.style.display='flex';
  if(type==='over'){
    ov.innerHTML=`<h1>GAME<br>OVER</h1><h2>💀 DEATHS: ${GS.deaths}</h2><button class="sb" onclick="restart()">► TRY AGAIN</button>`;
  } else {
    ov.innerHTML=`<h1>VICTORY!</h1><h2>YOU CONQUERED TRAP HELL</h2><button class="sb" onclick="restart()">► REPLAY</button>`;
  }
}

function restart(){
  document.getElementById('ov').style.display='none';
  GS.lvl = 1; GS.lives = 3; GS.deaths = 0; GS.playing = true;
  cpActive = false;
  loadLevel(1);
}
document.getElementById('sb').addEventListener('click', restart);

let frame = () => {
  if(GS.playing){
    updateP();
    updateLO();
    checkHazards();
    checkGoals();
    updateCamera();
    draw();
  }
  requestAnimationFrame(frame);
};
loadLevel(1);
draw();
frame();
</script>
</body>
</html>
